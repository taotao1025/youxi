<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精准投篮 - 每球一分</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            font-family: 'Arial', sans-serif;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        #scoreBoard {
            font-size: 50px;
            font-weight: bold;
            color: #333;
            text-shadow: 2px 2px 0px #fff;
        }

        #instructions {
            font-size: 16px;
            color: #555;
            margin-top: 5px;
            background: rgba(255,255,255,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="scoreBoard">得分: 0</div>
        <div id="instructions">按住鼠标拖拽拉弓 • 松开投篮 • 进一球得一分</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreBoard');

        // 游戏变量
        let width, height;
        let score = 0; // 初始分数为0
        
        // 物理设置
        const GRAVITY = 0.6;
        const BOUNCE = 0.6;
        const FRICTION = 0.99;

        // 篮球
        const ball = {
            x: 100,
            y: 0,
            radius: 20,
            vx: 0,
            vy: 0,
            isFlying: false,
            isDragging: false,
            color: '#ff6600'
        };

        // 篮筐
        const hoop = {
            x: 0,
            y: 0,
            rimY: 0,
            backboardX: 0
        };

        let mouseX = 0;
        let mouseY = 0;

        // 初始化
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            if (!ball.isFlying && !ball.isDragging) {
                resetBall();
            }

            hoop.x = width * 0.8;
            hoop.y = height * 0.35;
            hoop.rimY = hoop.y + 20;
            hoop.backboardX = hoop.x + 80;
        }

        function resetBall() {
            ball.x = width * 0.2;
            ball.y = height - 200;
            ball.isFlying = false;
            ball.isDragging = false;
            ball.vx = 0;
            ball.vy = 0;
        }

        window.addEventListener('resize', resize);
        resize();

        // --- 操作逻辑 ---

        canvas.addEventListener('mousedown', (e) => {
            if (ball.isFlying) return;
            const dist = Math.hypot(e.clientX - ball.x, e.clientY - ball.y);
            if (dist < 150) {
                ball.isDragging = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (ball.isDragging) {
                const dx = ball.x - e.clientX;
                const dy = ball.y - e.clientY;
                const power = 0.15;
                
                ball.vx = dx * power;
                ball.vy = dy * power;

                // 限制最大力度
                const maxSpeed = 25;
                const currentSpeed = Math.hypot(ball.vx, ball.vy);
                if (currentSpeed > maxSpeed) {
                    const ratio = maxSpeed / currentSpeed;
                    ball.vx *= ratio;
                    ball.vy *= ratio;
                }

                ball.isDragging = false;
                ball.isFlying = true;
            }
        });

        // --- 绘图 ---

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // 篮球纹路
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius, ball.y);
            ctx.lineTo(ball.x + ball.radius, ball.y);
            ctx.moveTo(ball.x, ball.y - ball.radius);
            ctx.lineTo(ball.x, ball.y + ball.radius);
            ctx.stroke();
        }

        function drawHoop() {
            // 篮板
            ctx.fillStyle = '#fff';
            ctx.fillRect(hoop.backboardX, hoop.y - 50, 10, 100);
            ctx.strokeStyle = '#cc0000';
            ctx.lineWidth = 3;
            ctx.strokeRect(hoop.backboardX, hoop.y - 50, 10, 100);

            // 篮筐
            ctx.beginPath();
            ctx.moveTo(hoop.x, hoop.rimY);
            ctx.lineTo(hoop.backboardX, hoop.rimY);
            ctx.strokeStyle = '#ff4500';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 篮网
            ctx.beginPath();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.moveTo(hoop.x, hoop.rimY);
            ctx.lineTo(hoop.x + 10, hoop.rimY + 40);
            ctx.lineTo(hoop.backboardX - 10, hoop.rimY + 40);
            ctx.lineTo(hoop.backboardX, hoop.rimY);
            ctx.stroke();
        }

        function drawTrajectory() {
            if (ball.isDragging) {
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);

                // 预测轨迹点
                const dx = ball.x - mouseX;
                const dy = ball.y - mouseY;
                let simX = ball.x;
                let simY = ball.y;
                let simVx = dx * 0.15;
                let simVy = dy * 0.15;
                
                const maxSpeed = 25;
                const currentSpeed = Math.hypot(simVx, simVy);
                if (currentSpeed > maxSpeed) {
                    const ratio = maxSpeed / currentSpeed;
                    simVx *= ratio;
                    simVy *= ratio;
                }

                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                for(let i=0; i<15; i++) {
                    simX += simVx;
                    simY += simVy;
                    simVy += GRAVITY;
                    ctx.beginPath();
                    ctx.arc(simX, simY, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        function drawFloor() {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, height - 20, width, 20);
        }

        // --- 物理更新 ---

        function update() {
            if (ball.isFlying) {
                ball.vy += GRAVITY;
                ball.vx *= FRICTION;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // 地面碰撞
                if (ball.y + ball.radius > height - 20) {
                    ball.y = height - 20 - ball.radius;
                    ball.vy *= -BOUNCE;
                    ball.vx *= 0.95;
                    if (Math.abs(ball.vy) < GRAVITY * 2 && Math.abs(ball.vx) < 0.5) {
                        resetBall();
                    }
                }

                // 墙壁碰撞
                if (ball.x + ball.radius > width) {
                    ball.x = width - ball.radius;
                    ball.vx *= -BOUNCE;
                } else if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx *= -BOUNCE;
                }

                // 篮板碰撞
                if (ball.x + ball.radius > hoop.backboardX && 
                    ball.x - ball.radius < hoop.backboardX + 10 &&
                    ball.y + ball.radius > hoop.y - 50 && 
                    ball.y - ball.radius < hoop.y + 50) {
                    ball.vx *= -BOUNCE;
                    ball.x = hoop.backboardX - ball.radius;
                }

                // --- 进球判定 ---
                // 严格判定：球心在篮筐范围内，且球下落穿过篮筐平面
                if (ball.x > hoop.x && ball.x < hoop.backboardX) {
                    if (ball.y + ball.radius > hoop.rimY && ball.y - ball.radius < hoop.rimY + 20 && ball.vy > 0) {
                        score++; // 每次只加 1 分
                        scoreEl.innerText = "得分: " + score;
                        
                        // 进球特效
                        ball.color = '#32CD32'; 
                        setTimeout(() => { if(!ball.isFlying) ball.color = '#ff6600'; }, 500);
                    }
                }
                
                // 篮筐边缘碰撞
                const rimLeft = Math.hypot(ball.x - hoop.x, ball.y - hoop.rimY);
                const rimRight = Math.hypot(ball.x - hoop.backboardX, ball.y - hoop.rimY);
                if (rimLeft < ball.radius + 2 || rimRight < ball.radius + 2) {
                    ball.vx *= -0.6;
                    ball.vy *= -0.6;
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            drawFloor();
            drawHoop();
            drawTrajectory();
            update();
            drawBall();
            requestAnimationFrame(loop);
        }

        loop();

    </script>
</body>
</html>
