<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>五子棋 · 无限关卡</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f6f6f6;padding:10px}
  .box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 0 12px rgba(0,0,0,0.1);max-width:500px;width:100%}
  h1{text-align:center;margin-bottom:10px;font-size:22px}
  .info{text-align:center;margin:8px 0;color:#333;font-size:16px;min-height:20px}
  .game-setting{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
  .game-setting button{padding:6px 10px;border:none;border-radius:6px;background:#58a;cursor:pointer;color:#fff}
  .game-setting button.active{background:#256}
  .difficulty{display:flex;gap:5px;margin:8px 0;justify-content:center}
  .difficulty button{padding:4px 8px;font-size:14px}
  .board{
    display:grid;
    grid-template-columns:repeat(15,26px);
    grid-template-rows:repeat(15,26px);
    gap:1px;
    background:#e0c9a6;
    padding:6px;
    margin:0 auto;
  }
  .cell{
    width:26px;height:26px;
    background:#f0e6d2;
    position:relative;
    cursor:pointer;
  }
  .cell.black::after{
    content:'';position:absolute;
    width:22px;height:22px;
    border-radius:50%;background:#000;
    top:2px;left:2px;
  }
  .cell.white::after{
    content:'';position:absolute;
    width:22px;height:22px;
    border-radius:50%;background:#fff;
    border:1px solid #ccc;
    top:2px;left:2px;
  }
  .btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:#4caf50;color:#fff}
  button.gray{background:#999}
  button.red{background:#f44336}
  .disabled{pointer-events:none;opacity:.6}
  .hidden{display:none}
</style>
</head>
<body>
<div class="box">
  <h1>五子棋 · 无限关卡</h1>
  <div class="info" id="status">请选择游戏模式</div>

  <div class="game-setting mode">
    <button data-mode="local">单机双人</button>
    <button data-mode="ai">人机对战</button>
    <button data-mode="online">多人联机</button>
  </div>

  <div class="game-setting difficulty hidden" id="difficulty">
    <button data-diff="easy">简单</button>
    <button data-diff="medium">中等</button>
    <button data-diff="hard">困难</button>
  </div>

  <div class="board" id="board"></div>

  <div class="btns">
    <button id="restart" class="gray disabled">重新开始</button>
    <button id="match" class="disabled">匹配对手</button>
    <button id="nextLevel" class="gray disabled hidden">下一关</button>
  </div>
</div>

<script>
const SIZE = 15;
let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
let current = 1;
let over = false;
let mode = '';

// 无限关卡核心
let level = 1;       // 关卡无限递增
let difficulty = 'easy';
let aiStrength = 1;  // AI强度：随关卡自动提升

let myRole = 0;
let ws = null;
let roomId = null;

const domBoard = document.getElementById('board');
const domStatus = document.getElementById('status');
const btnRestart = document.getElementById('restart');
const btnMatch = document.getElementById('match');
const btnNextLevel = document.getElementById('nextLevel');
const modeBtns = document.querySelectorAll('.mode button');
const diffBtns = document.querySelectorAll('.difficulty button');
const difficultyPanel = document.getElementById('difficulty');

// ==============================================
// 初始化
// ==============================================
function initUI(){
  domBoard.innerHTML = '';
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const d = document.createElement('div');
      d.className = 'cell';
      d.dataset.r = r;
      d.dataset.c = c;
      d.onclick = ()=>click(r,c);
      domBoard.appendChild(d);
    }
  }
}

function reset(){
  board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
  current = 1;
  over = false;
  initUI();
  updateStatus();
  btnRestart.classList.add('disabled');
  btnNextLevel.classList.add('disabled','hidden');
}

function updateStatus(){
  if(over){
    domStatus.textContent = '游戏结束';
    return;
  }
  if(mode === 'local'){
    domStatus.textContent = current ===1 ? '黑棋回合' : '白棋回合';
  } else if(mode === 'ai'){
    const diffText = {easy:'简单',medium:'中等',hard:'困难'}[difficulty];
    domStatus.textContent = `第 ${level} 关 | ${diffText} | ` + 
                           (current ===1 ? '你的回合' : 'AI思考中...');
  } else if(mode === 'online'){
    domStatus.textContent = !ws ? '未连接' : (current === myRole ? '你的回合' : '对方回合');
  } else {
    domStatus.textContent = '请选择游戏模式';
  }
}

function render(r,c,color){
  const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  cell.classList.add(color ===1 ? 'black' : 'white');
}

function checkWin(r,c,color){
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for(const [dx,dy] of dirs){
    let cnt = 1;
    for(let i=1;i<5;i++){
      const nr=r+dx*i, nc=c+dy*i;
      if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||board[nr][nc]!==color) break;
      cnt++;
    }
    for(let i=1;i<5;i++){
      const nr=r-dx*i, nc=c-dy*i;
      if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||board[nr][nc]!==color) break;
      cnt++;
    }
    if(cnt>=5) return true;
  }
  return false;
}

function click(r,c){
  if(over || board[r][c]!==0) return;
  if(mode === 'local') clickLocal(r,c);
  else if(mode === 'ai') clickAI(r,c);
  else if(mode === 'online') clickOnline(r,c);
}

// ==============================================
// 单机
// ==============================================
function clickLocal(r,c){
  board[r][c] = current;
  render(r,c,current);
  if(checkWin(r,c,current)){
    over = true;
    alert(current ===1 ? '黑棋胜' : '白棋胜');
  }
  current = 3 - current;
  btnRestart.classList.remove('disabled');
  updateStatus();
}

// ==============================================
// 无限关卡 AI
// ==============================================
function clickAI(r,c){
  if(current !== 1) return;

  board[r][c] = 1;
  render(r,c,1);

  if(checkWin(r,c,1)){
    over = true;
    alert(`恭喜！你通关了第 ${level} 关！`);
    btnRestart.classList.remove('disabled');
    btnNextLevel.classList.remove('disabled','hidden','gray');
    updateStatus();
    return;
  }

  current = 2;
  updateStatus();
  setTimeout(aiGo, 400);
}

// AI 强度随关卡自动提升
function aiGo(){
  const empty = [];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c] === 0) empty.push([r,c]);
    }
  }
  if(empty.length === 0) return;

  let best = null;

  // 赢
  best = findBest(2);
  if(best){
    placeAI(best);
    return;
  }

  // 堵玩家 5、4、3（随等级变强）
  const maxBlock = aiStrength + 2;
  for(let t=4;t>=Math.max(3,5-maxBlock);t--){
    best = findBest(1,t);
    if(best){
      placeAI(best);
      return;
    }
  }

  // 自己进攻
  for(let t=4;t>=3;t--){
    best = findBest(2,t);
    if(best){
      placeAI(best);
      return;
    }
  }

  // 随机
  placeAI(empty[Math.random()*empty.length|0]);
}

function findBest(color, need=5){
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]!==0) continue;
      board[r][c] = color;
      if(checkWin(r,c,color)){
        board[r][c] = 0;
        return [r,c];
      }
      board[r][c] = 0;
    }
  }
  return null;
}

function placeAI([r,c]){
  board[r][c] = 2;
  render(r,c,2);
  if(checkWin(r,c,2)){
    over = true;
    alert(`AI赢了！第 ${level} 关失败！`);
    btnRestart.classList.remove('disabled');
    updateStatus();
    return;
  }
  current = 1;
  updateStatus();
}

// ==============================================
// 联机
// ==============================================
function clickOnline(r,c){
  if(!ws || current !== myRole) return;
  ws.send(JSON.stringify({type:'place',r,c,roomId}));
}

function connect(){
  if(ws) ws.close();
  ws = new WebSocket('ws://localhost:8080');
  ws.onopen = ()=> updateStatus();
  ws.onmessage = e=>{
    const data=JSON.parse(e.data);
    if(data.type==='match'){
      roomId=data.roomId; myRole=data.role; reset();
      btnMatch.classList.add('disabled'); btnRestart.classList.remove('disabled');
    }
    if(data.type==='go'){
      board[data.r][data.c]=data.color;
      render(data.r,data.c,data.color);
      current=data.next;
      if(data.win){over=true;alert(data.color===1?'黑胜':'白胜')}
      updateStatus();
    }
  };
}

// ==============================================
// 模式切换
// ==============================================
modeBtns.forEach(b=>{
  b.onclick=()=>{
    modeBtns.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    difficultyPanel.classList.add('hidden');
    btnMatch.classList.add('disabled');
    btnNextLevel.classList.add('hidden');

    if(mode === 'ai'){
      difficultyPanel.classList.remove('hidden');
      diffBtns.forEach(x=>x.classList.remove('active'));
      diffBtns[0].classList.add('active');
      difficulty = 'easy';
      level = 1;
      aiStrength = 1;
    }
    if(mode === 'online') btnMatch.classList.remove('disabled');
    reset();
  }
});

diffBtns.forEach(b=>{
  b.onclick=()=>{
    diffBtns.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    difficulty = b.dataset.diff;
    aiStrength = {easy:1, medium:3, hard:5}[difficulty];
    level = 1;
    reset();
  }
});

btnRestart.onclick = ()=>{
  if(mode === 'ai') level = 1;
  reset();
};

btnNextLevel.onclick = ()=>{
  level++;
  // 每过一关AI轻微变强
  if(difficulty === 'easy' && level%3 ===0) aiStrength++;
  if(difficulty === 'medium' && level%2 ===0) aiStrength++;
  if(difficulty === 'hard') aiStrength++;
  reset();
};

btnMatch.onclick = ()=>{
  connect();
  setTimeout(()=>{
    if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'match'}));
  },500);
};

initUI();
updateStatus();
</script>
</body>
</html>
