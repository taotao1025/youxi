<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏选择中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="logo">游戏陆</div>
            <div class="search">
                <input type="text" placeholder="搜索游戏、分类...">
            </div>
            <div class="top-links">
                <a href="#">登录</a>
                <a href="#">注册</a>
                <a href="#">收藏游戏陆</a>
            </div>
        </div>
    </header>

    <main class="site-wrap">
        <section class="content">
            <div class="grid-header">
                <h2>热门小游戏</h2>
            </div>

            <div class="game-grid">
                <!-- 重复的游戏图标示例（可根据实际资源替换图片） -->
                <!-- 使用多张图片循环展示以接近样式 -->
                
                <!-- 生成 36 个示例项 -->
                
                <!-- 每个 .game-tile 包含图标和标题 -->
                
                
                <a class="game-tile" href="火柴人/火柴人.html">
                    <img src="assets/img/2.png" alt="游戏">
                    <span class="title">火柴人</span>
                </a>
                <a class="game-tile" href="贪吃蛇/贪吃蛇.html">
                    <img src="assets/img/1.png" alt="游戏">
                    <span class="title">贪吃蛇</span>
                </a>
                <a class="game-tile" href="密室逃脱/密室逃脱.html">
                    <img src="assets/img/3.png" alt="游戏">
                    <span class="title">密室逃脱</span>
                </a>
                <a class="game-tile" href="五子棋/五子棋.html">
                    <img src="assets/img/4.png" alt="游戏">
                    <span class="title">五子棋</span>
                </a>
                <a class="game-tile" href="中国象棋/中国象棋.html">
                    <img src="assets/img/5.png" alt="游戏">
                    <span class="title">中国象棋</span>
                </a>
                <a class="game-tile" href="cs/cs.html">
                    <img src="assets/img/6.png" alt="游戏">
                    <span class="title">cs</span>
                </a>
                <a class="game-tile" href="赛车/赛车.html">
                    <img src="assets/img/7.png" alt="游戏">
                    <span class="title">赛车</span>
                </a>



                
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>网页游戏</h3>
                    <a class="more" href="#">查看更多</a>
                </div>
                <ul class="featured-list">
                    <li>
                        <a href="火柴人/火柴人.html"><img src="assets/img/2.png" alt=""><span>火柴人</span></a>
                    </li>
                    <li>
                        <a href="贪吃蛇/贪吃蛇.html"><img src="assets/img/1.png" alt=""><span>贪吃蛇</span></a>
                    </li>
                    <li>
                        <a href="密室逃脱/密室逃脱.html"><img src="assets/img/3.png" alt=""><span>密室逃脱</span></a>
                    </li>
                </ul>
            </div>
        </aside>
    </main>

    <!-- 右侧工具栏 -->
    <div class="side-tools">
        <button class="tool">最新游戏</button>
        <button class="tool">女生游戏</button>
        <button class="tool">意见反馈</button>
        <button class="tool" id="backToTop">回到顶部</button>
    </div>

    <script src="script.js"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="e903613c-da31-428d-8401-10034a9d5004"></script><script defer src="https://cloud.umami.is/script.js" data-website-id="e903613c-da31-428d-8401-10034a9d5004"></script>
</body>
</html>
