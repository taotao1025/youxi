<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人大战 - AI版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .health-bar-container {
            width: 300px; height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
            border: 2px solid #555;
        }
        .health-bar { height: 100%; transition: width 0.2s; }
        #p1-health { background: linear-gradient(90deg, #4caf50, #8bc34a); width: 100%; }
        #p2-health { background: linear-gradient(90deg, #f44336, #ff9800); width: 100%; float: right; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        h1 { font-size: 60px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .subtitle { font-size: 18px; margin-bottom: 40px; opacity: 0.8; }
        
        .btn-group { display: flex; gap: 20px; }
        button {
            padding: 15px 40px;
            font-size: 22px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        button:active { transform: scale(0.95); }
        button.secondary { background: transparent; border: 2px solid #fff; color: #fff; }
        button.secondary:hover { background: #fff; color: #333; }

        .controls-hint {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
            line-height: 1.8;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">
            <div>
                <div id="p1-label">玩家 1 (WASD + F)</div>
                <div class="health-bar-container"><div id="p1-health" class="health-bar"></div></div>
            </div>
            <div style="text-align: right;">
                <div id="p2-label">AI 对手</div>
                <div class="health-bar-container"><div id="p2-health" class="health-bar"></div></div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1>火柴人大战</h1>
        <div class="subtitle">选择对战模式</div>
        <div class="btn-group">
            <button id="btn-ai">人机对战</button>
            <button id="btn-pvp" class="secondary">双人对战</button>
        </div>
        <div class="controls-hint">
            玩家1: W跳 / A左 / D右 / F攻击<br>
            玩家2: ↑跳 / ←左 / →右 / L攻击
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/**
 * 火柴人大战 - AI 增强版
 */

// --- 配置 ---
const CONFIG = {
    gravity: 0.6,
    friction: 0.85,
    groundHeight: 50,
    playerSpeed: 5,
    jumpForce: -12,
    attackRange: 65,
    attackDamage: 10,
    attackCooldown: 25,
    maxHealth: 100,
    // AI 配置
    aiReaction: 0.08,      // AI 反应速度 (0-1)
    aiAggression: 0.6,     // AI 攻击欲望 (0-1)
    aiSafeDistance: 80,    // AI 保持的安全距离
    aiJumpChance: 0.02     // AI 随机跳跃概率
};

// --- 全局状态 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const p1HealthBar = document.getElementById('p1-health');
const p2HealthBar = document.getElementById('p2-health');
const p1Label = document.getElementById('p1-label');
const p2Label = document.getElementById('p2-label');

let gameRunning = false;
let isAIMode = true;
let keys = {};
let particles = [];

// --- 工具函数 ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    // 防止方向键滚动页面
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// --- 粒子系统 ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.decay = Math.random() * 0.05 + 0.03;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // 粒子重力
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

function spawnHitEffect(x, y, color) {
    for(let i=0; i<12; i++) particles.push(new Particle(x, y, color));
}

// --- 火柴人类 ---
class Stickman {
    constructor(x, color, controls, facingRight, isAI = false) {
        this.x = x;
        this.y = canvas.height - CONFIG.groundHeight;
        this.vx = 0;
        this.vy = 0;
        this.width = 30;
        this.height = 80;
        this.color = color;
        this.controls = controls;
        this.facingRight = facingRight;
        this.isAI = isAI;
        
        this.health = CONFIG.maxHealth;
        this.isAttacking = false;
        this.attackTimer = 0;
        this.cooldown = 0;
        this.isGrounded = false;
        
        // AI 内部状态
        this.aiDecisionTimer = 0;
        this.aiTargetAction = 'idle';
    }

    update(opponent) {
        if (this.isAI) {
            this.updateAI(opponent);
        } else {
            this.handleInput();
        }

        // 物理
        this.vy += CONFIG.gravity;
        this.vx *= CONFIG.friction;
        this.x += this.vx;
        this.y += this.vy;

        // 地面
        if (this.y >= canvas.height - CONFIG.groundHeight) {
            this.y = canvas.height - CONFIG.groundHeight;
            this.vy = 0;
            this.isGrounded = true;
        }

        // 边界
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

        // 自动朝向
        if (opponent.x > this.x) this.facingRight = true;
        else this.facingRight = false;

        // 计时器
        if (this.attackTimer > 0) this.attackTimer--;
        else this.isAttacking = false;
        if (this.cooldown > 0) this.cooldown--;

        // --- 攻击判定 ---
        // 在这里检查攻击是否命中对手
        if (this.isAttacking && this.attackTimer === 9) { // 在第9帧判定
            const myCenter = this.x + this.width/2;
            const opCenter = opponent.x + opponent.width/2;
            const dist = Math.abs(myCenter - opCenter);
            const yDist = Math.abs(this.y - opponent.y);
            
            if (dist < CONFIG.attackRange && yDist < this.height) {
                opponent.takeDamage(CONFIG.attackDamage, this.facingRight ? 1 : -1);
            }
        }
    }

    handleInput() {
        if (keys[this.controls.left]) this.vx -= CONFIG.playerSpeed * 0.3;
        if (keys[this.controls.right]) this.vx += CONFIG.playerSpeed * 0.3;
        if (keys[this.controls.jump] && this.isGrounded) {
            this.vy = CONFIG.jumpForce;
            this.isGrounded = false;
        }
        if (keys[this.controls.attack] && this.cooldown <= 0 && !this.isAttacking) {
            this.performAttack();
        }
    }

    // --- AI 逻辑 ---
    updateAI(opponent) {
        this.aiDecisionTimer--;
        
        // 每隔一段时间重新决策
        if (this.aiDecisionTimer <= 0) {
            const dist = Math.abs(this.x - opponent.x);
            const rand = Math.random();

            // 1. 如果对手在攻击范围内且冷却好了 -> 攻击
            if (dist < CONFIG.attackRange + 20 && this.cooldown <= 0 && rand < CONFIG.aiAggression) {
                this.aiTargetAction = 'attack';
            }
            // 2. 如果太近且没在攻击 -> 后退或跳跃
            else if (dist < CONFIG.aiSafeDistance && rand < 0.3) {
                this.aiTargetAction = Math.random() > 0.5 ? 'retreat' : 'jump';
            }
            // 3. 如果太远 -> 靠近
            else if (dist > CONFIG.attackRange + 50) {
                this.aiTargetAction = 'approach';
            }
            // 4. 随机跳跃或 idle
            else {
                if (rand < CONFIG.aiJumpChance && this.isGrounded) this.aiTargetAction = 'jump';
                else this.aiTargetAction = 'idle';
            }

            this.aiDecisionTimer = Math.floor(10 + Math.random() * 20); // 10-30 帧决策一次
        }

        // 执行动作
        switch(this.aiTargetAction) {
            case 'approach':
                if (opponent.x > this.x) this.vx += CONFIG.playerSpeed * 0.25;
                else this.vx -= CONFIG.playerSpeed * 0.25;
                break;
            case 'retreat':
                if (opponent.x > this.x) this.vx -= CONFIG.playerSpeed * 0.3;
                else this.vx += CONFIG.playerSpeed * 0.3;
                break;
            case 'jump':
                if (this.isGrounded) {
                    this.vy = CONFIG.jumpForce;
                    this.isGrounded = false;
                    // 跳跃时稍微靠近
                    if (opponent.x > this.x) this.vx += 2;
                    else this.vx -= 2;
                }
                this.aiTargetAction = 'idle';
                break;
            case 'attack':
                if (this.cooldown <= 0 && !this.isAttacking) {
                    this.performAttack();
                }
                this.aiTargetAction = 'idle';
                break;
        }
    }

    performAttack() {
        this.isAttacking = true;
        this.attackTimer = 10;
        this.cooldown = CONFIG.attackCooldown;
        // 攻击判定现在在 update 中统一处理
    }


    takeDamage(amount, direction) {
        this.health -= amount;
        if (this.health < 0) this.health = 0;
        this.vx = direction * 12;
        this.vy = -6;
        spawnHitEffect(this.x + this.width/2, this.y - this.height/2, this.color);
        updateHealthUI();
    }

    draw(ctx) {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const cx = this.x + this.width / 2;
        const bottom = this.y;
        const headY = bottom - this.height;
        const bodyEnd = bottom - 30;
        const dir = this.facingRight ? 1 : -1;

        // 头
        ctx.beginPath();
        ctx.arc(cx, headY + 10, 10, 0, Math.PI * 2);
        ctx.stroke();

        // 身体
        ctx.beginPath();
        ctx.moveTo(cx, headY + 20);
        ctx.lineTo(cx, bodyEnd);
        ctx.stroke();

        // 腿
        ctx.beginPath();
        ctx.moveTo(cx, bodyEnd);
        ctx.lineTo(cx - 15, bottom);
        ctx.moveTo(cx, bodyEnd);
        ctx.lineTo(cx + 15, bottom);
        ctx.stroke();

        // 手臂
        ctx.beginPath();
        if (this.isAttacking) {
            ctx.moveTo(cx, headY + 30);
            ctx.lineTo(cx + dir * 45, headY + 25); // 出拳
            ctx.moveTo(cx, headY + 30);
            ctx.lineTo(cx - dir * 15, headY + 45);
        } else {
            const swing = Math.sin(Date.now() / 200) * 5;
            ctx.moveTo(cx, headY + 30);
            ctx.lineTo(cx - 15, headY + 45 + swing);
            ctx.moveTo(cx, headY + 30);
            ctx.lineTo(cx + 15, headY + 45 - swing);
        }
        ctx.stroke();
    }
}

// --- 游戏管理 ---
let player1, player2;

function initGame(aiMode) {
    isAIMode = aiMode;
    player1 = new Stickman(100, '#4caf50', {left:'a', right:'d', jump:'w', attack:'f'}, true, false);
    player2 = new Stickman(canvas.width - 150, '#f44336', {left:'arrowleft', right:'arrowright', jump:'arrowup', attack:'l'}, false, aiMode);
    
    p2Label.innerText = aiMode ? "AI 对手" : "玩家 2 (方向键 + L)";
    particles = [];
    updateHealthUI();
}

function updateHealthUI() {
    p1HealthBar.style.width = `${(player1.health / CONFIG.maxHealth) * 100}%`;
    p2HealthBar.style.width = `${(player2.health / CONFIG.maxHealth) * 100}%`;
}

function checkWin() {
    if (player1.health <= 0) endGame("AI 获胜!" , "再来一局");
    if (player2.health <= 0) endGame("玩家 1 获胜!", "再来一局");
}

function endGame(msg, btnText) {
    gameRunning = false;
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').innerText = msg;
    overlay.querySelector('.subtitle').innerText = "";
    document.querySelector('.btn-group').classList.add('hidden');
    document.querySelector('.controls-hint').classList.add('hidden');
    
    // 动态创建返回按钮
    let returnBtn = document.getElementById('return-btn');
    if (!returnBtn) {
        returnBtn = document.createElement('button');
        returnBtn.id = 'return-btn';
        returnBtn.onclick = showMenu;
        overlay.appendChild(returnBtn);
    }
    returnBtn.innerText = btnText;
    returnBtn.classList.remove('hidden');
}

function showMenu() {
    overlay.querySelector('h1').innerText = "火柴人大战";
    overlay.querySelector('.subtitle').innerText = "选择对战模式";
    document.querySelector('.btn-group').classList.remove('hidden');
    document.querySelector('.controls-hint').classList.remove('hidden');
    const returnBtn = document.getElementById('return-btn');
    if (returnBtn) returnBtn.classList.add('hidden');
    overlay.classList.remove('hidden');
}

function drawGround() {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, canvas.height - CONFIG.groundHeight, canvas.width, CONFIG.groundHeight);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - CONFIG.groundHeight);
    ctx.lineTo(canvas.width, canvas.height - CONFIG.groundHeight);
    ctx.stroke();
}

function loop() {
    if (!gameRunning) return;

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGround();

    player1.update(player2);
    player2.update(player1);
    
    // player1.checkAttackHit(player2); // 此行已移除
    // player2.checkAttackHit(player1); // 此行已移除
    // 攻击判定已在 update 内部完成

    player1.draw(ctx);
    player2.draw(ctx);

    // 粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    checkWin();
    requestAnimationFrame(loop);
}

// --- 按钮事件 ---
document.getElementById('btn-ai').onclick = () => {
    overlay.classList.add('hidden');
    initGame(true);
    gameRunning = true;
    loop();
};

document.getElementById('btn-pvp').onclick = () => {
    overlay.classList.add('hidden');
    initGame(false);
    gameRunning = true;
    loop();
};

</script>
</body>
</html>
