<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街头篮球双人对战</title>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #2c3e50;
            --accent-color: #f1c40f;
            --text-color: #ecf0f1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            border: 4px solid #fff;
            border-radius: 8px;
            width: 800px;
            height: 500px;
            background-color: #d35400;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* 木地板纹理 */
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- 主页/菜单样式 --- */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(44,62,80,0.9) 0%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        #main-menu.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0 #000;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: 18px;
            color: #bdc3c7;
            margin-bottom: 40px;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-start:hover {
            background-color: #d35400;
            transform: scale(1.05);
        }

        .controls-info {
            margin-top: 40px;
            display: flex;
            gap: 40px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .control-group {
            text-align: center;
        }

        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .p1-text { color: #ff6b6b; }
        .p2-text { color: #4ecdc4; }

        .key-badge {
            display: inline-block;
            background: #fff;
            color: #333;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin: 2px;
            box-shadow: 0 2px 0 #ccc;
        }

        /* --- 游戏内 UI --- */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none; /* 默认隐藏，开始后显示 */
        }

        #score-board {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        .score-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        #pause-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        #message-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 4px 4px 0 #000;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <!-- 画布 -->
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <!-- 主页菜单 -->
        <div id="main-menu">
            <h1>🏀 街头篮球对决</h1>
            <div class="subtitle">双人同屏竞技 · 物理碰撞 · 激情投篮</div>
            
            <button class="btn-start" onclick="startGame()">开始比赛</button>

            <div class="controls-info">
                <div class="control-group">
                    <h3 class="p1-text">红队 (玩家 1)</h3>
                    <div>
                        <span class="key-badge">W</span><span class="key-badge">A</span><span class="key-badge">S</span><span class="key-badge">D</span> 移动
                    </div>
                    <div style="margin-top:5px;">
                        <span class="key-badge">空格</span> 投篮/抢球
                    </div>
                </div>
                <div class="control-group">
                    <h3 class="p2-text">蓝队 (玩家 2)</h3>
                    <div>
                        <span class="key-badge">↑</span><span class="key-badge">←</span><span class="key-badge">↓</span><span class="key-badge">→</span> 移动
                    </div>
                    <div style="margin-top:5px;">
                        <span class="key-badge">Enter</span> 投篮/抢球
                    </div>
                </div>
            </div>
            <div style="margin-top: 20px; font-size: 12px; color: #7f8c8d;">
                提示: 按 ESC 键暂停/返回菜单
            </div>
        </div>

        <!-- 游戏内 UI -->
        <div id="game-ui">
            <div id="score-board">
                <div class="score-item" style="color: #ff6b6b;">红队: <span id="p1-score">0</span></div>
                <div class="score-item" style="color: #4ecdc4;">蓝队: <span id="p2-score">0</span></div>
            </div>
            <div id="message-overlay">得分!</div>
            <div id="pause-hint">按 ESC 暂停</div>
        </div>
    </div>

<script>
    // --- 游戏配置与状态 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 游戏状态: 'MENU', 'PLAYING', 'PAUSED'
    let gameState = 'MENU';
    
    let scores = { p1: 0, p2: 0 };
    let lastTime = 0;
    let animationFrameId;

    // 物理常量
    const FRICTION = 0.92;
    const PLAYER_SPEED = 0.8;
    const BALL_FRICTION = 0.98;
    const SHOOT_POWER = 13;

    // 输入状态
    const keys = {};

    // --- 类定义 ---

    class Vector {
        constructor(x, y) { this.x = x; this.y = y; }
        add(v) { return new Vector(this.x + v.x, this.y + v.y); }
        sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
        mult(n) { return new Vector(this.x * n, this.y * n); }
        mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
        normalize() {
            let m = this.mag();
            if (m === 0) return new Vector(0, 0);
            return new Vector(this.x / m, this.y / m);
        }
        dist(v) { return Math.sqrt(Math.pow(this.x - v.x, 2) + Math.pow(this.y - v.y, 2)); }
    }

    class Player {
        constructor(x, y, color, controls, id) {
            this.startPos = new Vector(x, y);
            this.pos = new Vector(x, y);
            this.vel = new Vector(0, 0);
            this.radius = 20;
            this.color = color;
            this.controls = controls;
            this.id = id;
            this.hasBall = false;
        }

        reset() {
            this.pos = new Vector(this.startPos.x, this.startPos.y);
            this.vel = new Vector(0, 0);
            this.hasBall = false;
        }

        update() {
            if (gameState !== 'PLAYING') return;

            // 移动逻辑
            if (keys[this.controls.up]) this.vel.y -= PLAYER_SPEED;
            if (keys[this.controls.down]) this.vel.y += PLAYER_SPEED;
            if (keys[this.controls.left]) this.vel.x -= PLAYER_SPEED;
            if (keys[this.controls.right]) this.vel.x += PLAYER_SPEED;

            this.pos = this.pos.add(this.vel);
            this.vel = this.vel.mult(FRICTION);

            // 边界限制
            if (this.pos.x < this.radius) { this.pos.x = this.radius; this.vel.x *= -0.5; }
            if (this.pos.x > canvas.width - this.radius) { this.pos.x = canvas.width - this.radius; this.vel.x *= -0.5; }
            if (this.pos.y < this.radius) { this.pos.y = this.radius; this.vel.y *= -0.5; }
            if (this.pos.y > canvas.height - this.radius) { this.pos.y = canvas.height - this.radius; this.vel.y *= -0.5; }

            // 投篮/捡球逻辑
            if (this.hasBall) {
                if (keys[this.controls.shoot]) {
                    shootBall(this);
                    keys[this.controls.shoot] = false; 
                }
            } else {
                if (!ball.holder && this.pos.dist(ball.pos) < this.radius + ball.radius) {
                    pickUpBall(this);
                }
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 持球指示器
            if (this.hasBall) {
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, this.radius + 6, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(241, 196, 15, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
    }

    class Ball {
        constructor() {
            this.radius = 12;
            this.reset();
            this.holder = null;
        }

        reset() {
            this.pos = new Vector(canvas.width / 2, canvas.height / 2);
            this.vel = new Vector(0, 0);
            this.holder = null;
        }

        update() {
            if (gameState !== 'PLAYING') return;

            if (this.holder) {
                this.pos = new Vector(this.holder.pos.x, this.holder.pos.y);
                this.vel = new Vector(0, 0);
            } else {
                this.pos = this.pos.add(this.vel);
                this.vel = this.vel.mult(BALL_FRICTION);

                // 墙壁反弹
                if (this.pos.x < this.radius) { this.pos.x = this.radius; this.vel.x *= -0.8; }
                if (this.pos.x > canvas.width - this.radius) { this.pos.x = canvas.width - this.radius; this.vel.x *= -0.8; }
                if (this.pos.y < this.radius) { this.pos.y = this.radius; this.vel.y *= -0.8; }
                if (this.pos.y > canvas.height - this.radius) { this.pos.y = canvas.height - this.radius; this.vel.y *= -0.8; }

                checkGoal();
                
                // 碰撞检测 (抢断)
                players.forEach(p => {
                    if (p !== this.holder && this.pos.dist(p.pos) < this.radius + p.radius) {
                        let dir = this.pos.sub(p.pos).normalize();
                        this.vel = this.vel.add(dir.mult(3));
                        p.vel = p.vel.sub(dir.mult(2));
                    }
                });
            }
        }

        draw() {
            if (this.holder) return; 

            ctx.beginPath();
            ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#e67e22';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 篮球纹路
            ctx.beginPath();
            ctx.moveTo(this.pos.x - this.radius, this.pos.y);
            ctx.lineTo(this.pos.x + this.radius, this.pos.y);
            ctx.stroke();
        }
    }

    // --- 游戏对象初始化 ---
    const p1 = new Player(100, 250, '#ff6b6b', { up: 'w', down: 's', left: 'a', right: 'd', shoot: ' ' }, 1);
    const p2 = new Player(700, 250, '#4ecdc4', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' }, 2);
    const ball = new Ball();
    const players = [p1, p2];

    const hoopLeft = { x: 40, y: 250, r: 18, owner: 2 };
    const hoopRight = { x: 760, y: 250, r: 18, owner: 1 };

    // --- 核心逻辑函数 ---

    function startGame() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-ui').style.display = 'block';
        
        scores.p1 = 0;
        scores.p2 = 0;
        updateScoreBoard();
        
        resetRound();
        gameState = 'PLAYING';
        
        if (!animationFrameId) {
            loop(0);
        }
    }

    function pauseGame() {
        if (gameState === 'PLAYING') {
            gameState = 'PAUSED';
            document.getElementById('main-menu').classList.remove('hidden');
            document.querySelector('#main-menu h1').innerText = "游戏暂停";
            document.querySelector('.btn-start').innerText = "继续比赛";
            document.querySelector('.subtitle').innerText = "按 ESC 或点击继续";
        } else if (gameState === 'PAUSED') {
            resumeGame();
        }
    }

    function resumeGame() {
        gameState = 'PLAYING';
        document.getElementById('main-menu').classList.add('hidden');
        document.querySelector('#main-menu h1').innerText = "🏀 街头篮球对决";
        document.querySelector('.btn-start').innerText = "开始比赛";
        document.querySelector('.subtitle').innerText = "双人同屏竞技 · 物理碰撞 · 激情投篮";
        lastTime = performance.now(); // 重置时间防止跳跃
        requestAnimationFrame(loop);
    }

    function pickUpBall(player) {
        ball.holder = player;
        player.hasBall = true;
    }

    function shootBall(player) {
        ball.holder = null;
        player.hasBall = false;
        
        let targetHoop = (player.id === 1) ? hoopRight : hoopLeft;
        let direction = new Vector(targetHoop.x, targetHoop.y).sub(player.pos).normalize();
        
        ball.vel = direction.mult(SHOOT_POWER);
        player.vel = player.vel.sub(direction.mult(2));
    }

    function checkGoal() {
        if (ball.pos.dist(new Vector(hoopLeft.x, hoopLeft.y)) < hoopLeft.r) {
            scorePoint(2);
        }
        if (ball.pos.dist(new Vector(hoopRight.x, hoopRight.y)) < hoopRight.r) {
            scorePoint(1);
        }
    }

    function scorePoint(playerId) {
        if (playerId === 1) scores.p1++;
        else scores.p2++;

        updateScoreBoard();
        showMessage(playerId === 1 ? "红队得分!" : "蓝队得分!");
        resetRound();
    }

    function resetRound() {
        ball.reset();
        p1.reset();
        p2.reset();
    }

    function updateScoreBoard() {
        document.getElementById('p1-score').innerText = scores.p1;
        document.getElementById('p2-score').innerText = scores.p2;
    }

    function showMessage(text) {
        const msgEl = document.getElementById('message-overlay');
        msgEl.innerText = text;
        msgEl.style.display = 'block';
        msgEl.style.animation = 'none';
        msgEl.offsetHeight; /* trigger reflow */
        msgEl.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        
        setTimeout(() => {
            msgEl.style.display = 'none';
        }, 1500);
    }

    function drawCourt() {
        // 中线
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 4;
        ctx.stroke();

        // 中圈
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2);
        ctx.stroke();

        // 绘制篮筐区域
        drawHoop(hoopLeft, '#4ecdc4');
        drawHoop(hoopRight, '#ff6b6b');
    }

    function drawHoop(hoop, color) {
        ctx.beginPath();
        ctx.arc(hoop.x, hoop.y, 45, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath();
        ctx.arc(hoop.x, hoop.y, hoop.r, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function resolvePlayerCollision(p1, p2) {
        let distVec = p1.pos.sub(p2.pos);
        let dist = distVec.mag();
        let minDist = p1.radius + p2.radius;

        if (dist < minDist) {
            let overlap = minDist - dist;
            let normal = distVec.normalize();
            
            p1.pos = p1.pos.add(normal.mult(overlap / 2));
            p2.pos = p2.pos.sub(normal.mult(overlap / 2));

            let tempVel = p1.vel;
            p1.vel = p2.vel.mult(0.8);
            p2.vel = tempVel.mult(0.8);
            
            // 碰撞掉球概率
            if (Math.random() > 0.6) {
                if (p1.hasBall) {
                    p1.hasBall = false;
                    ball.holder = null;
                    ball.vel = normal.mult(6);
                } else if (p2.hasBall) {
                    p2.hasBall = false;
                    ball.holder = null;
                    ball.vel = normal.mult(-6);
                }
            }
        }
    }

    // --- 主循环 ---

    function loop(timestamp) {
        if (gameState !== 'PLAYING') {
            // 即使在暂停或菜单，也绘制一帧背景以保持画面，但不更新逻辑
            if(gameState === 'PAUSED' || gameState === 'MENU') {
                 ctx.clearRect(0, 0, canvas.width, canvas.height);
                 drawCourt();
                 players.forEach(p => p.draw());
                 if(!ball.holder) ball.draw();
            }
            if (gameState === 'PLAYING') requestAnimationFrame(loop);
            return;
        }

        let dt = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawCourt();

        players.forEach(p => p.update());
        resolvePlayerCollision(p1, p2);
        ball.update();

        // 绘制持球时的球
        if (ball.holder) {
             ctx.beginPath();
             ctx.arc(ball.holder.pos.x + 12, ball.holder.pos.y + 12, ball.radius, 0, Math.PI * 2);
             ctx.fillStyle = '#e67e22';
             ctx.fill();
             ctx.strokeStyle = '#333';
             ctx.stroke();
        }

        players.forEach(p => p.draw());
        ball.draw();

        animationFrameId = requestAnimationFrame(loop);
    }

    // --- 事件监听 ---

    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        
        // 暂停功能
        if (e.key === 'Escape') {
            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                pauseGame();
            }
        }

        if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.code) > -1) {
            e.preventDefault();
        }
    });

    window.addEventListener('keyup', e => {
        keys[e.key] = false;
    });

    // 初始绘制一次背景
    drawCourt();

</script>
</body>
</html>
