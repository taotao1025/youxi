<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字滑轮道游戏</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --board-bg: #34495e;
            --tile-color: #3498db;
            --tile-hover: #2980b9;
            --text-color: #ecf0f1;
            --empty-color: #2c3e50; /* 和背景色一致，造成透明效果 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* 防止双击选中文字 */
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 5px;
            background-color: var(--board-bg);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tile {
            width: 100%;
            height: 100%;
            background-color: var(--tile-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, background-color 0.2s;
            box-sizing: border-box;
        }

        .tile:hover {
            background-color: var(--tile-hover);
        }

        /* 空白格子的样式 */
        .tile.empty {
            background-color: transparent;
            cursor: default;
            pointer-events: none; /* 空白格子不可点击 */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* 胜利状态 */
        .tile.correct {
            background-color: #27ae60;
        }
        
        /* 移动端适配 */
        @media (max-width: 500px) {
            .game-board {
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 70px);
                gap: 3px;
                padding: 5px;
            }
            .tile {
                font-size: 1.5rem;
                border-radius: 3px;
            }
        }
    </style>
</head>
<body>

    <h1>数字滑轮道</h1>
    
    <div class="controls">
        <span>步数: <b id="move-count">0</b></span>
        <button onclick="initGame()">重新开始</button>
    </div>

    <div class="game-board" id="board">
        <!-- 格子将通过 JS 生成 -->
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const moveCountElement = document.getElementById('move-count');
        
        // 游戏状态
        let tiles = []; // 存储当前格子的数字，15代表空白
        let moves = 0;
        const gridSize = 4; // 4x4 网格

        // 初始化游戏
        function initGame() {
            moves = 0;
            updateMoveCount();
            
            // 1. 创建有序数组 [1, 2, ..., 15, 15(代表空白)]
            // 我们用数字 1-15 代表方块，16 代表空白位置（但在显示时隐藏）
            tiles = Array.from({length: 16}, (_, i) => i + 1);
            
            // 2. 随机打乱
            // 注意：为了保证游戏一定有解，我们不能完全随机排列。
            // 简单的方法是：从完成状态开始，模拟随机移动几步。
            shuffleTiles();
            
            renderBoard();
        }

        // 模拟随机移动来打乱（保证有解）
        function shuffleTiles() {
            // 模拟 100 次随机移动
            let emptyIndex = 15; // 初始空白在右下角 (索引15)
            
            for (let i = 0; i < 100; i++) {
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                
                // 交换
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
                emptyIndex = randomNeighbor;
            }
        }

        // 获取某个索引周围的合法邻居索引（上下左右）
        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;

            if (row > 0) neighbors.push(index - gridSize); // 上
            if (row < gridSize - 1) neighbors.push(index + gridSize); // 下
            if (col > 0) neighbors.push(index - 1); // 左
            if (col < gridSize - 1) neighbors.push(index + 1); // 右

            return neighbors;
        }

        // 渲染界面
        function renderBoard() {
            boardElement.innerHTML = ''; // 清空当前棋盘

            tiles.forEach((num, index) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                
                if (num === 16) {
                    tile.classList.add('empty'); // 如果是空白块
                } else {
                    tile.textContent = num;
                    // 简单的颜色逻辑，让数字看起来更有趣
                    // 如果是正确的位置，可以加一点绿色色调（可选）
                    if (num === index + 1) {
                        // tile.style.backgroundColor = '#2ecc71'; 
                    }
                }

                // 绑定点击事件
                tile.onclick = () => handleTileClick(index);
                boardElement.appendChild(tile);
            });
        }

        // 处理点击逻辑
        function handleTileClick(index) {
            const emptyIndex = tiles.indexOf(16); // 找到空白块的位置
            
            // 检查点击的方块是否与空白块相邻
            if (isAdjacent(index, emptyIndex)) {
                // 交换数据
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                
                moves++;
                updateMoveCount();
                renderBoard();
                checkWin();
            }
        }

        // 判断两个索引是否相邻
        function isAdjacent(idx1, idx2) {
            const row1 = Math.floor(idx1 / gridSize);
            const col1 = idx1 % gridSize;
            const row2 = Math.floor(idx2 / gridSize);
            const col2 = idx2 % gridSize;

            // 曼哈顿距离为 1 即为相邻
            return Math.abs(row1 - row2) + Math.abs(col1 - col2) === 1;
        }

        // 更新步数显示
        function updateMoveCount() {
            moveCountElement.textContent = moves;
        }

        // 检查胜利条件
        function checkWin() {
            // 检查数组是否为 [1, 2, ..., 15, 16]
            const isWin = tiles.every((val, index) => val === index + 1);
            
            if (isWin) {
                // 延迟一点点弹出，让用户看到最后一步
                setTimeout(() => {
                    alert(`恭喜！你赢了！\n总共用了 ${moves} 步。`);
                }, 100);
            }
        }

        // 页面加载时启动游戏
        initGame();

    </script>
</body>
</html>
