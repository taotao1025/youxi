<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人对战：回合制版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { margin-bottom: 10px; }

        #scoreboard {
            display: flex;
            gap: 40px;
            font-size: 1.5rem;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px 30px;
            border-radius: 10px;
        }

        .p1-score { color: #3498db; } /* 蓝色 */
        .p2-score { color: #e74c3c; } /* 红色 */
        
        #status-bar {
            width: 600px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #f1c40f;
            height: 24px;
        }

        canvas {
            background-color: #ecf0f1;
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #controls {
            margin-top: 15px;
            display: flex;
            gap: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        .key {
            display: inline-block;
            background: #fff;
            color: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

    <h1>👮 双人对战：回合制 🦹</h1>
    
    <div id="scoreboard">
        <div class="p1-score">👮 警察: <span id="scoreP1">0</span></div>
        <div class="p2-score">🦹 小偷: <span id="scoreP2">0</span></div>
    </div>

    <div id="status-bar">当前回合: <span id="turnText">警察行动</span> (剩余步数: <span id="movesLeft">50</span>)</div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div id="controls">
        <div>
            <strong style="color:#3498db">玩家 1 (警察)</strong><br>
            移动: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
        </div>
        <div>
            <strong style="color:#e74c3c">玩家 2 (小偷)</strong><br>
            移动: <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
        </div>
    </div>

    <button onclick="resetGame()">重新开始对局</button>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreP1Element = document.getElementById('scoreP1');
    const scoreP2Element = document.getElementById('scoreP2');
    const turnText = document.getElementById('turnText');
    const movesLeftText = document.getElementById('movesLeft');

    // 游戏配置
    const TILE_SIZE = 40; 
    const COLS = canvas.width / TILE_SIZE;
    const ROWS = canvas.height / TILE_SIZE;
    const MAX_MOVES = 50; // 警察每回合最多走50步，抓不到就算输

    let scoreP1 = 0; 
    let scoreP2 = 0; 
    let currentTurn = 'police'; // 'police' or 'thief'
    let movesRemaining = MAX_MOVES;
    let walls = [];

    const police = { x: 1, y: 1 };
    const thief = { x: COLS - 2, y: ROWS - 2 };

    function init() {
        scoreP1 = 0;
        scoreP2 = 0;
        updateScoreboard();
        startNewRound();
    }

    function startNewRound() {
        generateWalls();
        resetPositions();
        currentTurn = 'police';
        movesRemaining = MAX_MOVES;
        updateStatus();
        draw();
    }

    function updateScoreboard() {
        scoreP1Element.innerText = scoreP1;
        scoreP2Element.innerText = scoreP2;
    }

    function updateStatus() {
        if (currentTurn === 'police') {
            turnText.innerText = "👮 警察行动";
            turnText.style.color = "#3498db";
        } else {
            turnText.innerText = "🦹 小偷行动";
            turnText.style.color = "#e74c3c";
        }
        movesLeftText.innerText = movesRemaining;
    }

    function generateWalls() {
        walls = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let isWall = (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1);
                if (!isWall && Math.random() < 0.15) isWall = true;

                if (isWall) {
                    let nearPolice = (r < 3 && c < 3);
                    let nearThief = (r > ROWS - 4 && c > COLS - 4);
                    if (!nearPolice && !nearThief) {
                        walls.push({ x: c, y: r });
                    }
                }
            }
        }
    }

    function resetPositions() {
        police.x = 1;
        police.y = 1;
        thief.x = COLS - 2;
        thief.y = ROWS - 2;
    }

    function isWall(x, y) {
        return walls.some(w => w.x === x && w.y === y);
    }

    // 统一处理移动逻辑
    function handleMove(player, dx, dy) {
        const nextX = player.x + dx;
        const nextY = player.y + dy;

        if (nextX >= 0 && nextX < COLS && nextY >= 0 && nextY < ROWS && !isWall(nextX, nextY)) {
            player.x = nextX;
            player.y = nextY;
            return true; 
        }
        return false; 
    }

    function checkWinCondition() {
        // 1. 检查碰撞（警察赢）
        if (police.x === thief.x && police.y === thief.y) {
            scoreP1++;
            updateScoreboard();
            flashColor('#3498db');
            setTimeout(startNewRound, 500); // 延迟一点让玩家看到结果
            return true;
        }

        // 2. 检查步数耗尽（小偷赢）
        if (movesRemaining <= 0) {
            scoreP2++;
            updateScoreboard();
            flashColor('#e74c3c');
            setTimeout(startNewRound, 500);
            return true;
        }

        return false;
    }

    function flashColor(color) {
        canvas.style.borderColor = color;
        setTimeout(() => canvas.style.borderColor = '#34495e', 300);
    }

    // 键盘监听
    document.addEventListener('keydown', (e) => {
        let moved = false;
        let acted = false; // 是否执行了一个有效动作

        // --- 警察回合 (WASD) ---
        if (currentTurn === 'police') {
            switch(e.key.toLowerCase()) {
                case 'w': moved = handleMove(police, 0, -1); break;
                case 's': moved = handleMove(police, 0, 1); break;
                case 'a': moved = handleMove(police, -1, 0); break;
                case 'd': moved = handleMove(police, 1, 0); break;
            }
            
            if (moved) {
                movesRemaining--;
                acted = true;
                // 警察动完，切换给小偷
                if (!checkWinCondition()) {
                    currentTurn = 'thief';
                }
            }
        } 
        
        // --- 小偷回合 (方向键) ---
        else if (currentTurn === 'thief') {
            // 阻止方向键滚动页面
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            switch(e.key) {
                case 'ArrowUp': moved = handleMove(thief, 0, -1); break;
                case 'ArrowDown': moved = handleMove(thief, 0, 1); break;
                case 'ArrowLeft': moved = handleMove(thief, -1, 0); break;
                case 'ArrowRight': moved = handleMove(thief, 1, 0); break;
            }

            if (moved) {
                acted = true;
                // 小偷动完，切换回警察
                if (!checkWinCondition()) {
                    currentTurn = 'police';
                }
            }
        }

        if (acted) {
            updateStatus();
            draw();
        }
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制墙壁
        ctx.fillStyle = '#7f8c8d';
        walls.forEach(w => {
            ctx.fillRect(w.x * TILE_SIZE, w.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.strokeStyle = '#95a5a6';
            ctx.strokeRect(w.x * TILE_SIZE, w.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        });

        // 绘制警察
        ctx.font = `${TILE_SIZE - 4}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('👮', police.x * TILE_SIZE + TILE_SIZE / 2, police.y * TILE_SIZE + TILE_SIZE / 2 + 2);

        // 绘制小偷
        ctx.fillText('🦹', thief.x * TILE_SIZE + TILE_SIZE / 2, thief.y * TILE_SIZE + TILE_SIZE / 2 + 2);
    }

    function resetGame() {
        init();
    }

    init();

</script>
</body>
</html>
