<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平精英 3D - 终极修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; user-select: none; }
        
        /* UI 通用 */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .screen.active { display: flex; }
        #start-screen { background: linear-gradient(135deg, #2c3e50, #34495e); }
        #game-over-screen, #pause-menu { background: rgba(0,0,0,0.85); }
        
        h1 { font-size: 3.5rem; color: #f39c12; text-shadow: 0 0 20px rgba(243,156,18,0.5); margin-bottom: 20px; }
        p { color: #aaa; font-size: 1.1rem; margin-bottom: 30px; }
        
        .btn {
            width: 260px; padding: 16px; margin: 12px; font-size: 1.3rem;
            background: linear-gradient(45deg, #e74c3c, #c0392b); color: white;
            border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 6px 20px rgba(231,76,60,0.5); }
        .btn.blue { background: linear-gradient(45deg, #3498db, #2980b9); }

        /* 游戏画面 */
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #game-container.active { display: block; }
        #game-canvas { width: 100%; height: 100%; outline: none; }

        /* HUD */
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 100; }
        #hud.active { display: block; }

        .hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; }
        .panel { background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px; border: 2px solid #f39c12; backdrop-filter: blur(5px); }
        .panel span { font-size: 1.1rem; margin: 0 10px; font-weight: bold; }
        .val { color: #f39c12; }

        /* 队伍状态 */
        #team-status {
            position: absolute; top: 80px; left: 20px;
            width: 220px;
        }
        .tm-item {
            background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db;
            margin: 5px 0; padding: 8px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .tm-name { font-size: 0.9rem; color: #fff; }
        .tm-hp-box { width: 80px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .tm-hp-fill { height: 100%; background: #3498db; width: 100%; transition: width 0.3s; }
        .tm-state { font-size: 0.8rem; margin-left: 5px; }
        .st-ok { color: #2ecc71; }
        .st-down { color: #e74c3c; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* 敌人列表 */
        #enemy-list {
            position: absolute; top: 80px; right: 20px;
            width: 200px; max-height: 300px; overflow-y: auto;
        }
        .en-item {
            background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c;
            margin: 5px 0; padding: 8px; border-radius: 6px;
        }
        .en-hp-box { width: 100%; height: 6px; background: #333; margin-top: 5px; border-radius: 3px; overflow: hidden; }
        .en-hp-fill { height: 100%; background: #e74c3c; width: 100%; transition: width 0.2s; }

        /* 准星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 24px; height: 24px;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #0f0; box-shadow: 0 0 4px #000;
        }
        #crosshair::before { width: 2px; height: 24px; left: 11px; }
        #crosshair::after { width: 24px; height: 2px; top: 11px; }

        /* 小地图 */
        #minimap {
            position: absolute; top: 20px; right: 20px;
            width: 160px; height: 160px;
            background: rgba(0,0,0,0.7); border: 2px solid #f39c12; border-radius: 10px;
            overflow: hidden;
        }
        #minimap-canvas { width: 100%; height: 100%; }

        /* 武器 */
        #weapon-info {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(0,0,0,0.7); padding: 15px 25px;
            border-radius: 10px; border: 2px solid #f39c12; text-align: right;
        }
        #ammo { font-size: 2.2rem; font-weight: bold; color: #fff; }
        #w-name { color: #f39c12; font-size: 1rem; margin-bottom: 5px; }

        /* 提示 */
        #hints {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px;
            font-size: 0.85rem; color: #ccc; line-height: 1.6;
        }
        #hints strong { color: #f39c12; }
        #rescue-msg {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(231, 76, 60, 0.95); color: #fff;
            padding: 15px 30px; border-radius: 10px; font-size: 1.4rem; font-weight: bold;
            border: 2px solid #fff; display: none; animation: pulse 0.8s infinite;
            box-shadow: 0 0 20px rgba(231,76,60,0.6);
        }
        #rescue-msg.show { display: block; }
        @keyframes pulse { 50% { transform: translate(-50%, -50%) scale(1.05); } }

        /* 伤害数字 */
        .dmg-txt {
            position: absolute; color: #fff; font-weight: 900; font-size: 1.4rem;
            text-shadow: 0 0 5px #000; pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        .dmg-crit { color: #ffeb3b; font-size: 1.8rem; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); }
        }

        /* 结果 */
        .result-box {
            background: rgba(255,255,255,0.1); padding: 30px 50px;
            border-radius: 15px; text-align: center; border: 2px solid #f39c12;
            margin-bottom: 20px; min-width: 300px;
        }
        .result-box p { margin: 10px 0; color: #fff; }
        .result-box strong { color: #f39c12; font-size: 1.6rem; }
    </style>
</head>
<body>

    <!-- 开始界面 -->
    <div id="start-screen" class="screen active">
        <h1>🎯 和平精英 3D</h1>
        <p>小队战术竞技 - 终极修复版 (360°自由视角 + 智能队友)</p>
        <button class="btn" onclick="startGame()">🎮 开始作战</button>
        <button class="btn blue" onclick="alert('WASD: 移动\n鼠标: 360°自由瞄准\n左键: 射击\nR: 换弹\nF: 救援倒地队友\nESC: 暂停\n\n💡 队友会自动索敌开火！')">❓ 操作帮助</button>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-top">
            <div class="panel">
                <span>❤️ 生命: <span class="val" id="hp-val">100</span></span>
            </div>
            <div class="panel">
                <span>🎯 淘汰: <span class="val" id="kill-val">0</span></span>
                <span>⏱️ 时间: <span class="val" id="time-val">90</span>s</span>
            </div>
        </div>

        <!-- 队伍状态 -->
        <div id="team-status"></div>
        <!-- 敌人状态 -->
        <div id="enemy-list"></div>

        <div id="crosshair"></div>
        <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
        
        <div id="weapon-info">
            <div id="w-name">M416 突击步枪</div>
            <div id="ammo">30 / 90</div>
        </div>

        <div id="hints">
            <p><strong>WASD</strong> 移动 | <strong>鼠标</strong> 360°瞄准</p>
            <p><strong>左键</strong> 射击 | <strong>R</strong> 换弹</p>
            <p><strong>F</strong> 救援倒地队友 (靠近按F)</p>
        </div>
        <div id="rescue-msg">按住 F 救援队友!</div>
    </div>

    <!-- 结束界面 -->
    <div id="game-over-screen" class="screen">
        <h2 id="end-title" style="font-size:3rem; color:#f39c12; margin-bottom:20px;">🏆 行动结束</h2>
        <div class="result-box">
            <p>个人淘汰：<strong id="final-kills">0</strong></p>
            <p>小队存活：<strong id="final-team">0</strong></p>
            <p>最终得分：<strong id="final-score">0</strong></p>
        </div>
        <button class="btn" onclick="startGame()">🔄 再次部署</button>
        <button class="btn blue" onclick="location.reload()">🏠 返回大厅</button>
    </div>

    <!-- 暂停界面 -->
    <div id="pause-menu" class="screen">
        <h2 style="color:#f39c12; margin-bottom:30px;">⏸️ 游戏暂停</h2>
        <button class="btn" onclick="resumeGame()">▶️ 继续战斗</button>
        <button class="btn blue" onclick="quitGame()">🏠 退出任务</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script>
        // ================= 配置参数 =================
        const CFG = {
            mapSize: 120,
            playerSpeed: 0.45,
            teammateSpeed: 0.38,
            enemySpeed: 0.14,
            enemyMaxHp: 100,
            bulletDmg: 35,       // 单发伤害
            headshotMul: 2.0,    // 爆头倍数
            fireRate: 90,        // 射速 (ms)
            reloadTime: 1500,
            maxAmmo: 30,
            reserveAmmo: 90,
            teammateFireRate: 600, // 队友射速稍慢
            teammateRange: 40      // 队友索敌范围
        };

        // ================= 游戏状态 =================
        let state = {
            active: false,
            player: { hp: 100, kills: 0, score: 0, ammo: 30, reserve: 90 },
            teammates: [],
            enemies: [],
            bullets: [],
            timer: 90,
            lastShot: 0,
            reloading: false,
            rescuing: null,
            rescueProgress: 0
        };

        // ================= Three.js 变量 =================
        let scene, camera, renderer;
        let playerObj; // 玩家对象 (Group)
        let clock;
        let isLocked = false;
        let input = { f:false, b:false, l:false, r:false };
        let minimapCtx;
        
        // 组
        let groupEnemies, groupTeammates, groupBullets, groupItems;

        // ================= 初始化 =================
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('active');
            }, 500);
            setupInputs();
        };

        function setupInputs() {
            document.addEventListener('keydown', e => {
                if(!state.active) return;
                switch(e.code) {
                    case 'KeyW': input.f = true; break;
                    case 'KeyS': input.b = true; break;
                    case 'KeyA': input.l = true; break;
                    case 'KeyD': input.r = true; break;
                    case 'KeyR': reload(); break;
                    case 'KeyF': tryRescue(); break;
                    case 'Escape': togglePause(); break;
                }
            });
            document.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': input.f = false; break;
                    case 'KeyS': input.b = false; break;
                    case 'KeyA': input.l = false; break;
                    case 'KeyD': input.r = false; break;
                }
            });
            document.addEventListener('mousedown', e => {
                if(state.active && e.button === 0) shoot();
            });
            document.addEventListener('mousemove', e => {
                if(isLocked && state.active) {
                    // 核心修复：直接旋转玩家对象，实现360度无死角
                    playerObj.rotation.y -= e.movementX * 0.002;
                    
                    // 限制垂直视角 (防止翻跟头)
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camera.rotation.x));
                }
            });
            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === document.body;
                if(!isLocked && state.active && !document.getElementById('pause-menu').classList.contains('active')) {
                    // 如果意外丢失锁定且没暂停，可以尝试重新锁定或提示
                }
            });
            window.addEventListener('resize', onResize);
        }

        // ================= 游戏启动 =================
        function startGame() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('game-container').classList.add('active');
            document.getElementById('hud').classList.add('active');
            
            // 重置状态
            state = {
                active: true,
                player: { hp: 100, kills: 0, score: 0, ammo: CFG.maxAmmo, reserve: CFG.reserveAmmo },
                teammates: [],
                enemies: [],
                bullets: [],
                timer: 90,
                lastShot: 0,
                reloading: false,
                rescuing: null,
                rescueProgress: 0
            };

            initWorld();
            spawnTeammates(3);
            spawnEnemies(6);
            
            clock = new THREE.Clock();
            gameLoop();
            
            // 计时器
            setInterval(() => {
                if(!state.active) return;
                state.timer--;
                document.getElementById('time-val').innerText = state.timer;
                if(state.timer <= 0) endGame(false);
            }, 1000);

            requestPointerLock();
            updateUI();
        }

        function initWorld() {
            if(renderer) {
                renderer.dispose();
                scene.traverse(obj => {
                    if(obj.geometry) obj.geometry.dispose();
                    if(obj.material) obj.material.dispose();
                });
            }

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 50, 110);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // 灯光
            const amb = new THREE.AmbientLight(0xffffff, 0.6); scene.add(amb);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(50, 100, 50); dir.castShadow = true;
            dir.shadow.camera.left = -60; dir.shadow.camera.right = 60;
            dir.shadow.camera.top = 60; dir.shadow.camera.bottom = -60;
            scene.add(dir);

            // 地面
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(CFG.mapSize, CFG.mapSize),
                new THREE.MeshStandardMaterial({ color: 0x3d8c40, roughness: 0.8 })
            );
            ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

            // 网格
            const grid = new THREE.GridHelper(CFG.mapSize, 24, 0x000000, 0x000000);
            grid.material.opacity = 0.15; grid.material.transparent = true; scene.add(grid);

            // 玩家 (绿色)
            playerObj = new THREE.Group();
            createCharacter(playerObj, 0x2ecc71);
            scene.add(playerObj);

            // 组
            groupEnemies = new THREE.Group(); scene.add(groupEnemies);
            groupTeammates = new THREE.Group(); scene.add(groupTeammates);
            groupBullets = new THREE.Group(); scene.add(groupBullets);
            groupItems = new THREE.Group(); scene.add(groupItems);

            // 障碍物
            for(let i=0; i<20; i++) {
                const s = 2 + Math.random()*4;
                const box = new THREE.Mesh(new THREE.BoxGeometry(s,s,s), new THREE.MeshStandardMaterial({color: 0x8b4513}));
                box.position.set((Math.random()-0.5)*CFG.mapSize*0.8, s/2, (Math.random()-0.5)*CFG.mapSize*0.8);
                box.castShadow = true; box.receiveShadow = true; scene.add(box);
            }

            // 小地图
            const cvs = document.getElementById('minimap-canvas');
            cvs.width = 160; cvs.height = 160;
            minimapCtx = cvs.getContext('2d');
        }

        function createCharacter(group, color) {
            group.clear();
            // 身体
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.4, 1.8, 8),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.9; body.castShadow = true;
            
            // 头部 (用于爆头判定)
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xf5deb3 })
            );
            head.position.y = 2.0; head.castShadow = true; head.name = "head";

            // 枪
            const gun = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.15, 0.7),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            gun.position.set(0.35, 1.5, 0.4);
            gun.castShadow = true;

            group.add(body, head, gun);
        }

        function spawnTeammates(count) {
            const names = ["突击手-老张", "狙击手-小李", "医疗兵-小王"];
            for(let i=0; i<count; i++) {
                const tm = new THREE.Group();
                createCharacter(tm, 0x3498db); // 蓝色
                
                // 围绕玩家生成
                const angle = (Math.PI * 2 / count) * i;
                tm.position.set(Math.cos(angle)*6, 0, Math.sin(angle)*6);
                
                groupTeammates.add(tm);
                
                state.teammates.push({
                    mesh: tm,
                    name: names[i],
                    hp: 100, maxHp: 100,
                    alive: true,
                    lastShot: 0,
                    state: 'follow' // follow, fight
                });
            }
            updateTeamUI();
        }

        function spawnEnemies(count) {
            for(let i=0; i<count; i++) {
                const en = new THREE.Group();
                createCharacter(en, 0xe74c3c); // 红色
                
                // 随机远处生成
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 30;
                en.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
                
                groupEnemies.add(en);
                
                // 绑定数据到 mesh
                en.userData = { 
                    hp: CFG.enemyMaxHp, 
                    maxHp: CFG.enemyMaxHp,
                    lastHit: 0
                };
                
                state.enemies.push({ mesh: en, hp: CFG.enemyMaxHp });
            }
            updateEnemyUI();
        }

        // ================= 核心逻辑循环 =================
        function gameLoop() {
            if(!state.active) return;
            requestAnimationFrame(gameLoop);
            
            const dt = clock.getDelta();

            // 1. 玩家移动 (基于玩家朝向)
            const moveDir = new THREE.Vector3(0, 0, 0);
            if(input.f) moveDir.z -= 1;
            if(input.b) moveDir.z += 1;
            if(input.l) moveDir.x -= 1;
            if(input.r) moveDir.x += 1;

            if(moveDir.length() > 0) {
                moveDir.normalize();
                // 关键：将移动方向应用到玩家的旋转上，实现前后左右相对移动
                moveDir.applyQuaternion(playerObj.quaternion);
                
                playerObj.position.x += moveDir.x * CFG.playerSpeed;
                playerObj.position.z += moveDir.z * CFG.playerSpeed;
                
                // 边界限制
                const limit = CFG.mapSize/2 - 3;
                playerObj.position.x = THREE.MathUtils.clamp(playerObj.position.x, -limit, limit);
                playerObj.position.z = THREE.MathUtils.clamp(playerObj.position.z, -limit, limit);
            }

            // 相机跟随玩家头部位置
            camera.position.copy(playerObj.position);
            camera.position.y += 1.7; // 眼睛高度

            // 2. 子弹逻辑
            for(let i = state.bullets.length-1; i>=0; i--) {
                const b = state.bullets[i];
                b.mesh.position.add(b.vel);
                b.life--;

                let hit = false;
                // 检测击中敌人
                for(let j = state.enemies.length-1; j>=0; j--) {
                    const en = state.enemies[j];
                    // 简单距离检测
                    if(b.mesh.position.distanceTo(en.mesh.position) < 1.2) {
                        // 爆头检测
                        const headPos = new THREE.Vector3();
                        en.mesh.getObjectByName("head")?.getWorldPosition(headPos);
                        const isHead = b.mesh.position.distanceTo(headPos) < 0.5;
                        
                        let dmg = CFG.bulletDmg;
                        if(isHead) dmg *= CFG.headshotMul;
                        
                        // 扣血
                        en.mesh.userData.hp -= dmg;
                        en.hp = en.mesh.userData.hp;
                        
                        // 特效
                        if(Date.now() - en.mesh.userData.lastHit > 100) {
                            en.mesh.children[0].material.emissive.setHex(0xffffff);
                            setTimeout(() => { if(en.mesh) en.mesh.children[0].material.emissive.setHex(0x000000); }, 100);
                            en.mesh.userData.lastHit = Date.now();
                            showDamage(dmg, en.mesh.position.clone().add(new THREE.Vector3(0, 2.2, 0)), isHead);
                        }
                        
                        hit = true;
                        if(en.mesh.userData.hp <= 0) {
                            killEnemy(j);
                        } else {
                            updateEnemyUI();
                        }
                        break;
                    }
                }

                if(hit || b.life <= 0) {
                    groupBullets.remove(b.mesh);
                    state.bullets.splice(i, 1);
                }
            }

            // 3. 敌人 AI (追踪玩家)
            state.enemies.forEach(en => {
                if(en.hp <= 0) return;
                const mesh = en.mesh;
                
                // 朝向玩家
                mesh.lookAt(playerObj.position.x, 0.9, playerObj.position.z);
                
                const dist = mesh.position.distanceTo(playerObj.position);
                if(dist > 3) {
                    const dir = new THREE.Vector3().subVectors(playerObj.position, mesh.position);
                    dir.y = 0; dir.normalize();
                    mesh.position.add(dir.multiplyScalar(CFG.enemySpeed));
                }
                
                // 攻击玩家
                if(dist < 20 && Math.random() < 0.03) {
                    state.player.hp -= 4;
                    updateUI();
                    if(state.player.hp <= 0) endGame(false);
                }
            });

            // 4. 队友 AI (智能跟随 + 战斗)
            state.teammates.forEach(tm => {
                if(!tm.alive) return;
                
                // 寻找最近敌人
                let target = null;
                let minDist = CFG.teammateRange;
                
                state.enemies.forEach(en => {
                    const d = tm.mesh.position.distanceTo(en.mesh.position);
                    if(d < minDist) {
                        minDist = d;
                        target = en;
                    }
                });

                if(target) {
                    // 战斗模式：转身面向敌人并射击
                    tm.state = 'fight';
                    tm.mesh.lookAt(target.mesh.position.x, 0.9, target.mesh.position.z);
                    
                    if(Date.now() - tm.lastShot > CFG.teammateFireRate) {
                        tm.lastShot = Date.now();
                        teammateShoot(tm);
                    }
                    
                    // 保持一定距离射击
                    if(minDist > 15) {
                        const dir = new THREE.Vector3().subVectors(target.mesh.position, tm.mesh.position);
                        dir.y = 0; dir.normalize();
                        tm.mesh.position.add(dir.multiplyScalar(CFG.teammateSpeed * 0.8));
                    }
                } else {
                    // 跟随模式：走向玩家
                    tm.state = 'follow';
                    const distToPlayer = tm.mesh.position.distanceTo(playerObj.position);
                    if(distToPlayer > 8) {
                        tm.mesh.lookAt(playerObj.position);
                        const dir = new THREE.Vector3().subVectors(playerObj.position, tm.mesh.position);
                        dir.y = 0; dir.normalize();
                        tm.mesh.position.add(dir.multiplyScalar(CFG.teammateSpeed));
                    }
                }
            });

            // 5. 救援逻辑检测
            checkRescue();

            // 6. 渲染小地图
            drawMinimap();

            renderer.render(scene, camera);
        }

        function shoot() {
            const now = Date.now();
            if(state.reloading || state.player.ammo <= 0 || now - state.lastShot < CFG.fireRate) {
                if(state.player.ammo <= 0 && !state.reloading) reload();
                return;
            }
            
            state.player.ammo--;
            state.lastShot = now;
            updateUI();

            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            bullet.position.copy(playerObj.position);
            bullet.position.y += 1.5;
            
            // 子弹方向：基于玩家当前的朝向
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(playerObj.quaternion);
            bullet.userData = { vel: dir.multiplyScalar(3.0), life: 50 };
            
            groupBullets.add(bullet);
            state.bullets.push({ mesh: bullet, life: 50 });
        }

        function teammateShoot(tm) {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0x3498db })
            );
            bullet.position.copy(tm.mesh.position);
            bullet.position.y += 1.5;
            
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(tm.mesh.quaternion);
            bullet.userData = { vel: dir.multiplyScalar(3.0), life: 50 };
            
            groupBullets.add(bullet);
            state.bullets.push({ mesh: bullet, life: 50 });
        }

        function reload() {
            if(state.reloading || state.player.ammo === CFG.maxAmmo) return;
            state.reloading = true;
            document.getElementById('ammo').innerText = "🔄...";
            setTimeout(() => {
                const need = CFG.maxAmmo - state.player.ammo;
                const add = Math.min(need, state.player.reserve);
                state.player.ammo += add;
                state.player.reserve -= add;
                state.reloading = false;
                updateUI();
            }, CFG.reloadTime);
        }

        function killEnemy(idx) {
            const en = state.enemies[idx];
            groupEnemies.remove(en.mesh);
            state.enemies.splice(idx, 1);
            
            state.player.kills++;
            state.player.score += 100;
            
            // 补充敌人
            setTimeout(() => {
                if(state.active && state.enemies.length < 6) spawnEnemies(1);
            }, 2000);
            
            updateUI();
            updateEnemyUI();
        }

        function showDamage(val, pos, isCrit) {
            const div = document.createElement('div');
            div.className = 'dmg-txt' + (isCrit ? ' dmg-crit' : '');
            div.innerText = isCrit ? `💥 ${val}!` : `-${val}`;
            document.body.appendChild(div);
            
            const vec = pos.clone();
            vec.project(camera);
            const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vec.y * 0.5) + 0.5) * window.innerHeight;
            
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            
            setTimeout(() => div.remove(), 800);
        }

        // ================= UI 更新 =================
        function updateUI() {
            document.getElementById('hp-val').innerText = Math.ceil(state.player.hp);
            document.getElementById('kill-val').innerText = state.player.kills;
            document.getElementById('ammo').innerText = `${state.player.ammo} / ${state.player.reserve}`;
        }

        function updateTeamUI() {
            const container = document.getElementById('team-status');
            container.innerHTML = '<div style="color:#3498db; font-weight:bold; margin-bottom:5px;">👥 小队状态</div>';
            
            state.teammates.forEach(tm => {
                const pct = (tm.hp / tm.maxHp) * 100;
                const status = tm.alive ? (tm.state === 'fight' ? '🔫' : '✅') : '💀';
                const cls = tm.alive ? 'st-ok' : 'st-down';
                
                const div = document.createElement('div');
                div.className = 'tm-item';
                div.innerHTML = `
                    <span class="tm-name">${tm.name}</span>
                    <div style="display:flex;align-items:center;">
                        <div class="tm-hp-box"><div class="tm-hp-fill" style="width:${pct}%"></div></div>
                        <span class="tm-state ${cls}">${status}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateEnemyUI() {
            const container = document.getElementById('enemy-list');
            container.innerHTML = '<div style="color:#e74c3c; font-weight:bold; margin-bottom:5px; text-align:right;">👾 敌方动态</div>';
            
            state.enemies.forEach(en => {
                const pct = (en.hp / en.maxHp) * 100;
                const div = document.createElement('div');
                div.className = 'en-item';
                div.innerHTML = `
                    <div style="font-size:0.8rem; color:#fff;">敌人 HP: ${Math.ceil(en.hp)}</div>
                    <div class="en-hp-box"><div class="en-hp-fill" style="width:${pct}%"></div></div>
                `;
                container.appendChild(div);
            });
        }

        function drawMinimap() {
            const ctx = minimapCtx;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0,0,160,160);
            
            const scale = 160 / CFG.mapSize;
            const cx = 80 - playerObj.position.x * scale;
            const cz = 80 - playerObj.position.z * scale;
            
            // 玩家
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.arc(cx, cz, 6, 0, Math.PI*2); ctx.fill();
            
            // 队友
            ctx.fillStyle = '#3498db';
            state.teammates.forEach(tm => {
                if(!tm.alive) return;
                const x = 80 - tm.mesh.position.x * scale;
                const z = 80 - tm.mesh.position.z * scale;
                ctx.beginPath(); ctx.arc(x, z, 5, 0, Math.PI*2); ctx.fill();
            });
            
            // 敌人
            ctx.fillStyle = '#e74c3c';
            state.enemies.forEach(en => {
                const x = 80 - en.mesh.position.x * scale;
                const z = 80 - en.mesh.position.z * scale;
                ctx.beginPath(); ctx.arc(x, z, 4, 0, Math.PI*2); ctx.fill();
            });
        }

        // ================= 救援系统 =================
        function checkRescue() {
            let canRescue = false;
            state.teammates.forEach(tm => {
                if(!tm.alive && playerObj.position.distanceTo(tm.mesh.position) < 3.5) {
                    canRescue = true;
                    state.rescuing = tm;
                }
            });
            
            const msg = document.getElementById('rescue-msg');
            if(canRescue && state.rescuing) msg.classList.add('show');
            else {
                msg.classList.remove('show');
                state.rescuing = null;
                state.rescueProgress = 0;
            }
        }

        function tryRescue() {
            if(!state.rescuing || state.rescuing.alive) return;
            
            const interval = setInterval(() => {
                if(!state.active || !state.rescuing) { clearInterval(interval); return; }
                if(playerObj.position.distanceTo(state.rescuing.mesh.position) > 3.5) {
                    clearInterval(interval); return;
                }
                
                state.rescueProgress += 50; // 每50ms加一次
                if(state.rescueProgress >= 3000) {
                    // 救援成功
                    state.rescuing.alive = true;
                    state.rescuing.hp = 60;
                    // 恢复姿态
                    state.rescuing.mesh.rotation.x = 0;
                    state.rescuing.mesh.rotation.z = 0;
                    state.rescuing.mesh.position.y = 0;
                    
                    showDamage("+60", state.rescuing.mesh.position.clone().add(new THREE.Vector3(0,2,0)), false);
                    updateTeamUI();
                    
                    state.rescuing = null;
                    state.rescueProgress = 0;
                    clearInterval(interval);
                    document.getElementById('rescue-msg').classList.remove('show');
                }
            }, 50);
        }

        // ================= 游戏控制 =================
        function requestPointerLock() {
            document.body.requestPointerLock();
        }

        function onResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function togglePause() {
            if(!state.active) return;
            const menu = document.getElementById('pause-menu');
            if(menu.classList.contains('active')) {
                resumeGame();
            } else {
                state.active = false;
                document.exitPointerLock();
                menu.classList.add('active');
            }
        }

        function resumeGame() {
            document.getElementById('pause-menu').classList.remove('active');
            state.active = true;
            requestPointerLock();
            gameLoop();
        }

        function quitGame() {
            location.reload();
        }

        function endGame(win) {
            state.active = false;
            document.exitPointerLock();
            
            const aliveCount = state.teammates.filter(t => t.alive).length + (state.player.hp > 0 ? 1 : 0);
            const title = win ? "🏆 大吉大利，今晚吃鸡!" : "💀 任务失败";
            document.getElementById('end-title').innerText = title;
            
            document.getElementById('final-kills').innerText = state.player.kills;
            document.getElementById('final-team').innerText = aliveCount;
            document.getElementById('final-score').innerText = state.player.score;
            
            document.getElementById('game-over-screen').classList.add('active');
            document.getElementById('hud').classList.remove('active');
        }
    </script>
</body>
</html>
