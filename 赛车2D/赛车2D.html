<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>越野狂飙 - 稳定版</title>
<style>
    body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #gameBox { position: relative; box-shadow: 0 0 50px rgba(255, 62, 62, 0.4); border: 4px solid #fff; }
    canvas { display: block; background: linear-gradient(to bottom, #87CEEB, #90EE90); }
    
    #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 2px 2px 0 #000; width: 300px; }
    .hud-item { font-size: 20px; margin-bottom: 8px; font-weight: bold; }
    
    #nitroContainer { width: 200px; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 5px; transform: skewX(-20deg); }
    #nitroBar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ff3e3e); transition: width 0.1s; }
    
    .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    h1 { color: #ff3e3e; font-size: 50px; margin: 0; font-style: italic; }
    p { font-size: 18px; color: #ccc; margin: 20px 0; text-align: center; }
    button { padding: 15px 40px; font-size: 24px; background: #ff3e3e; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    button:hover { background: #fff; color: #ff3e3e; }
    #endScreen { display: none; }
</style>
</head>
<body>

<div id="gameBox">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div id="ui">
        <div class="hud-item">排名: <span id="rankDisplay">1</span>/4</div>
        <div class="hud-item">速度: <span id="speedDisplay">0</span> km/h</div>
        <div style="display:flex; align-items:center;">
            <div id="nitroContainer"><div id="nitroBar"></div></div>
            <span style="font-size:14px; color:#ffcc00; margin-left:5px;">NITRO [Shift]</span>
        </div>
    </div>

    <div id="startScreen" class="screen">
        <h1>山地极速赛</h1>
        <p>
            [↑] 加速 &nbsp; [↓] 刹车<br>
            [空格] 跳跃 (利用坡道飞得更远!)<br>
            [Shift] 氮气加速
        </p>
        <button onclick="startGame()">开始比赛</button>
    </div>

    <div id="endScreen" class="screen">
        <h1 id="resultTitle">完赛!</h1>
        <p id="resultMsg">最终排名: -</p>
        <button onclick="location.reload()">再来一局</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 修复了地面检测逻辑，确保车子能稳稳落地
const TOTAL_DISTANCE = 15000;
const BASE_GROUND_Y = 400; // 基准地面
const CAR_HEIGHT = 35;     // 车身高度
const WHEEL_RADIUS = 16;   // 轮胎半径

let gameState = 'START';
let cameraX = 0;

const keys = { ArrowUp: false, ArrowDown: false, Space: false, Shift: false };
window.addEventListener('keydown', e => { 
    if(e.code === 'Space') keys.Space = true; 
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.Shift = true; 
    keys[e.code] = true; 
});
window.addEventListener('keyup', e => { 
    if(e.code === 'Space') keys.Space = false; 
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.Shift = false; 
    keys[e.code] = false; 
});

// 生成起伏地形
function getTerrainHeight(x) {
    let y = Math.sin(x * 0.002) * 60; // 大山丘
    y += Math.sin(x * 0.01) * 20;     // 小坡度
    y += Math.sin(x * 0.03) * 5;      // 细节
    if (x < 500) y *= (x / 500);      // 起跑线平缓
    return BASE_GROUND_Y + y;
}

class Car {
    constructor(x, color, isPlayer = false) {
        this.x = x;
        this.y = 0; // 初始Y由update计算
        this.width = 90;
        this.height = 35;
        this.color = color;
        this.isPlayer = isPlayer;
        
        this.vx = 0;
        this.vy = 0;
        this.angle = 0; 
        
        this.maxSpeed = isPlayer ? 16 : 13 + Math.random() * 2;
        this.nitroMaxSpeed = 26;
        this.nitro = 0;
        this.isNitroActive = false;
        
        this.finished = false;
        this.onGround = true; // 初始状态视为在地面
    }

    update() {
        if (this.finished) {
            this.vx *= 0.95;
        } else {
            // AI 逻辑
            if (!this.isPlayer) {
                if (this.vx < this.maxSpeed) this.vx += 0.15;
                if(Math.random() < 0.005) this.vx += 2;
            } 
            // 玩家逻辑
            else {
                if (keys.ArrowUp) {
                    let currentMax = this.isNitroActive ? this.nitroMaxSpeed : this.maxSpeed;
                    if (this.vx < currentMax) this.vx += 0.2;
                }
                if (keys.ArrowDown) this.vx -= 0.3;
                
                // 氮气
                if (keys.Shift && this.nitro > 0) {
                    this.isNitroActive = true;
                    this.nitro -= 0.8;
                    createParticles(this.x - 40, this.y + 10, '#ffcc00');
                } else {
                    this.isNitroActive = false;
                    if (this.nitro < 100 && this.vx > 5) this.nitro += 0.1; 
                }

                // 跳跃 (仅在地面且按下空格时)
                if (keys.Space && this.onGround) {
                    this.vy = -13;
                    this.onGround = false;
                }
            }
        }

        // --- 物理与地形交互 ---
        
        this.vx *= 0.99; // 阻力
        if (this.vx < 0) this.vx = 0;

        // 重力
        this.vy += 0.6; 
        
        // 预测下一帧的位置
        let nextX = this.x + this.vx;
        let nextY = this.y + this.vy;
        
        // 计算车轮接触地面的高度
        // 车底距离车轴的高度 + 轮胎半径
        let groundLevelOffset = 15 + WHEEL_RADIUS; 
        let targetGroundY = getTerrainHeight(nextX);
        
        // 判断是否应该接触地面
        // 如果车底低于地面，说明碰撞了
        if (nextY + groundLevelOffset >= targetGroundY) {
            this.y = targetGroundY - groundLevelOffset; // 修正位置
            this.vy = 0;           // 停止下落
            this.onGround = true;
            
            // 计算坡度角度 (让车头随坡度倾斜)
            let hFront = getTerrainHeight(nextX + 35);
            let hBack = getTerrainHeight(nextX - 35);
            let slopeAngle = Math.atan2(hFront - hBack, 70);
            this.angle = slopeAngle;

            // 上坡减速，下坡加速
            this.vx += Math.sin(slopeAngle) * 0.4; 

        } else {
            // 在空中
            this.y = nextY;
            this.onGround = false;
            // 空中旋转 (模拟惯性)
            this.angle += this.vy * 0.01;
        }

        this.x = nextX;
        this.distance = this.x;
    }

    draw(ctx, camX) {
        let drawX = this.x - camX;
        if (drawX < -200 || drawX > canvas.width + 200) return;

        ctx.save();
        ctx.translate(drawX, this.y);
        ctx.rotate(this.angle); 

        // 氮气火焰
        if (this.isNitroActive) {
            ctx.fillStyle = `rgba(255, ${Math.random()*200}, 0, 0.8)`;
            ctx.beginPath();
            ctx.moveTo(-40, 5);
            ctx.lineTo(-80 - Math.random()*20, 10);
            ctx.lineTo(-40, 15);
            ctx.fill();
        }

        // 车身主体
        ctx.fillStyle = this.isNitroActive ? '#ff6b6b' : this.color;
        ctx.beginPath();
        ctx.moveTo(-40, 5);
        ctx.lineTo(40, 5);
        ctx.lineTo(45, -5);
        ctx.lineTo(30, -20);
        ctx.lineTo(-10, -25);
        ctx.lineTo(-40, -5);
        ctx.fill();

        // 车窗
        ctx.fillStyle = '#add8e6';
        ctx.beginPath();
        ctx.moveTo(-8, -20);
        ctx.lineTo(28, -15);
        ctx.lineTo(28, 0);
        ctx.lineTo(-20, 0);
        ctx.fill();

        // 车轮
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-30, 15, WHEEL_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(30, 15, WHEEL_RADIUS, 0, Math.PI*2); ctx.fill();
        
        // 轮毂
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        let rot = this.x * 0.1;
        ctx.beginPath(); ctx.moveTo(-30, 15); ctx.lineTo(-30 + Math.cos(rot)*12, 15 + Math.sin(rot)*12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(30, 15); ctx.lineTo(30 + Math.cos(rot)*12, 15 + Math.sin(rot)*12); ctx.stroke();

        ctx.restore();

        // 玩家标记
        if (this.isPlayer) {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.fillText("YOU", drawX - 15, this.y - 40);
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.moveTo(drawX, this.y - 50);
            ctx.lineTo(drawX - 10, this.y - 65);
            ctx.lineTo(drawX + 10, this.y - 65);
            ctx.fill();
        }
    }
}

let player;
let enemies = [];
let particles = [];

function createParticles(x, y, color) {
    for(let i=0; i<2; i++) {
        particles.push({ x: x, y: y, vx: -5 - Math.random() * 5, vy: (Math.random() - 0.5) * 2, life: 1.0, color: color });
    }
}

function init() {
    player = new Car(100, '#ff3e3e', true);
    enemies = [ new Car(200, '#3e8eff'), new Car(50, '#3eff5e'), new Car(0, '#eeff3e') ];
    particles = [];
}

function startGame() {
    init();
    document.getElementById('startScreen').style.display = 'none';
    gameState = 'PLAYING';
    loop();
}

function drawBackground(camX) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 远山
    ctx.fillStyle = '#A9D6E5';
    ctx.beginPath();
    for(let i=0; i<15; i++) {
        let mx = (i * 250) - (camX * 0.1) % 3000;
        ctx.moveTo(mx, 500);
        ctx.lineTo(mx + 125, 300);
        ctx.lineTo(mx + 250, 500);
    }
    ctx.fill();

    // 绘制地面
    ctx.fillStyle = '#5D4037'; 
    ctx.beginPath();
    ctx.moveTo(0, 500);
    
    for (let sx = 0; sx <= canvas.width; sx += 10) {
        let worldX = sx + camX;
        let gy = getTerrainHeight(worldX);
        ctx.lineTo(sx, gy);
    }
    
    ctx.lineTo(canvas.width, 500);
    ctx.fill();

    // 草地描边
    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 10;
    ctx.beginPath();
    for (let sx = 0; sx <= canvas.width; sx += 10) {
        let worldX = sx + camX;
        let gy = getTerrainHeight(worldX);
        if (sx===0) ctx.moveTo(sx, gy);
        else ctx.lineTo(sx, gy);
    }
    ctx.stroke();
}

function loop() {
    if (gameState !== 'PLAYING' && gameState !== 'END') return;

    player.update();
    enemies.forEach(e => e.update());

    let targetCamX = player.x - 250;
    if (targetCamX < 0) targetCamX = 0;
    cameraX += (targetCamX - cameraX) * 0.1;

    drawBackground(cameraX);

    particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.fillRect(p.x - cameraX, p.y, 6, 6);
        ctx.globalAlpha = 1;
        if(p.life <= 0) particles.splice(index, 1);
    });

    let allCars = [player, ...enemies].sort((a,b) => a.y - b.y);
    allCars.forEach(car => car.draw(ctx, cameraX));

    let racers = [player, ...enemies].sort((a, b) => b.x - a.x);
    document.getElementById('rankDisplay').innerText = racers.indexOf(player) + 1;
    document.getElementById('speedDisplay').innerText = Math.floor(player.vx * 15);
    document.getElementById('nitroBar').style.width = player.nitro + '%';

    if (player.x >= TOTAL_DISTANCE && !player.finished) {
        player.finished = true;
        setTimeout(() => {
            gameState = 'END';
            document.getElementById('endScreen').style.display = 'flex';
            let rank = racers.indexOf(player) + 1;
            document.getElementById('resultTitle').innerText = rank === 1 ? "🏆 冠军!" : "比赛结束";
            document.getElementById('resultMsg').innerText = `最终排名: 第 ${rank} 名`;
        }, 1000);
    }

    requestAnimationFrame(loop);
}

drawBackground(0);
</script>
</body>
</html>
