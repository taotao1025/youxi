<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠游戏 - 锤子版</title>
    <style>
        /* --- CSS 样式部分 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
            text-align: center;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 关键：隐藏默认鼠标指针，使用自定义锤子 */
            cursor: none; 
            user-select: none; /* 防止点击过快选中文字 */
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 10px;
            font-size: 3rem;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10; /* 确保按钮在锤子之上 */
        }

        .score-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-right: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer; /* 按钮上保留指针，提示可点击 */
        }

        /* --- 自定义锤子样式 --- */
        .hammer {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            font-size: 80px;
            line-height: 80px;
            text-align: center;
            pointer-events: none; /* 让鼠标事件穿透锤子，穿透到下方的地鼠 */
            z-index: 9999;
            transform: translate(-20px, -20px) rotate(-45deg); /* 初始位置偏移，像握在手里 */
            transition: transform 0.1s;
        }

        /* 点击时的敲击动画类 */
        .hammer.bonk {
            transform: translate(-20px, 20px) rotate(45deg); /* 向下挥动 */
        }

        /* 游戏区域网格 */
        .game {
            width: 600px;
            height: 400px;
            display: flex;
            flex-wrap: wrap;
            margin: 0 auto;
        }

        .hole {
            flex: 1 0 33.33%;
            overflow: hidden;
            position: relative;
            border-bottom: 2px solid #5d4037;
            background-color: #5d4037;
            border-radius: 50%;
            margin-bottom: -20px;
            z-index: 1;
        }

        .mole {
            background: #8d6e63;
            position: absolute;
            top: 100%;
            width: 60%;
            height: 80%;
            border-radius: 40% 40% 10% 10%;
            left: 20%;
            transition: all 0.4s;
            cursor: none; /* 地鼠上也隐藏指针 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .mole::before {
            content: '🐹';
            font-size: 60px;
        }

        .hole.up .mole {
            top: 10%;
        }

        @media (max-width: 650px) {
            .game { width: 300px; height: 300px; }
            .hole { flex: 1 0 50%; }
            .hammer { width: 50px; height: 50px; font-size: 50px; line-height: 50px; }
        }
    </style>
</head>
<body>

    <h1>打地鼠大作战</h1>

    <div class="controls">
        <span class="score-board">得分：<span class="score">0</span></span>
        <button onClick="startGame()">开始游戏!</button>
    </div>

    <div class="game">
        <div class="hole hole1"><div class="mole"></div></div>
        <div class="hole hole2"><div class="mole"></div></div>
        <div class="hole hole3"><div class="mole"></div></div>
        <div class="hole hole4"><div class="mole"></div></div>
        <div class="hole hole5"><div class="mole"></div></div>
        <div class="hole hole6"><div class="mole"></div></div>
    </div>

    <!-- 这里是我们新增的锤子元素 -->
    <div class="hammer">🔨</div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.querySelector('.score');
        const moles = document.querySelectorAll('.mole');
        const startBtn = document.querySelector('button');
        const hammer = document.querySelector('.hammer'); // 获取锤子元素
        
        let lastHole;
        let timeUp = false;
        let score = 0;

        // --- 锤子跟随鼠标逻辑 ---
        document.addEventListener('mousemove', e => {
            // 让锤子的中心跟随鼠标位置
            hammer.style.top = e.clientY + 'px';
            hammer.style.left = e.clientX + 'px';
        });

        // --- 点击锤子动画逻辑 ---
        document.addEventListener('mousedown', () => {
            hammer.classList.add('bonk');
        });

        document.addEventListener('mouseup', () => {
            hammer.classList.remove('bonk');
        });

        // 随机时间
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // 随机选坑
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        // 地鼠冒头
        function peep() {
            const time = randomTime(400, 1000);
            const hole = randomHole(holes);
            hole.classList.add('up');

            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        // 开始游戏
        function startGame() {
            scoreBoard.textContent = 0;
            score = 0;
            timeUp = false;
            startBtn.disabled = true;
            startBtn.textContent = "游戏进行中...";
            
            peep();

            setTimeout(() => {
                timeUp = true;
                startBtn.disabled = false;
                startBtn.textContent = "再玩一次";
                alert('游戏结束！你的最终得分是: ' + score);
            }, 15000); 
        }

        // 打地鼠逻辑
        function bonk(e) {
            if(!e.isTrusted) return; 
            score++;
            this.parentNode.classList.remove('up'); 
            scoreBoard.textContent = score;
            
            // 可选：打中时锤子变色或特效
            hammer.style.transform = "scale(1.5)";
            setTimeout(() => hammer.style.transform = "scale(1)", 100);
        }

        moles.forEach(mole => mole.addEventListener('click', bonk));

    </script>
</body>
</html>
